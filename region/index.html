<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>West Region — RP Dashboard</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1 id="scopeTitle">West Region</h1>
    <span class="badge" id="scopeBadge">JUN 2026 — 6 ACTUAL + 6 BUDGET</span>
    <div class="kpi-strip" id="kpiStrip"></div>
  </div>

  <!-- Drill: breadcrumb (where you are) + sibling buttons (where you can go) -->
  <div class="drill" id="drill"></div>

  <!-- Chart navigation: All / Scorecard / Gap / etc. -->
  <div class="nav" id="nav"></div>

  <!-- Charts grid -->
  <div class="grid" id="grid"></div>

  <div class="footer">
    <p>Fabricated data • Click a card to isolate · Click officer bars in chart ⑪ to drill in</p>
  </div>
</div>

<!-- Order matters: config defines globals used by data, charts, and main -->
<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/charts.js"></script>
<script src="js/main.js"></script>
</body>
</html>
