<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>West Region — Financial Dashboard</title>
<link rel="stylesheet" href="css/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="header">
    <h1 id="scopeTitle">West Region — Financial Performance</h1>
    <span class="badge" id="scopeBadge">JUN 2026 YTD — 6 ACTUAL + 6 FORECAST</span>
    <div class="kpi-strip" id="kpiStrip"></div>
  </div>

  <!-- Drill: breadcrumb + sibling navigation -->
  <div class="drill" id="drill"></div>

  <!-- Chart navigation: All / Revenue / Profitability / Balance Sheet / etc. -->
  <div class="nav" id="nav"></div>

  <!-- Charts grid -->
  <div class="grid" id="grid"></div>

  <div class="footer">
    <p>Synthetic data • Click market or officer to drill in • 6 months actual + 6 months forecast</p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/data.js"></script>
<script src="js/charts.js"></script>
<script src="js/main.js"></script>
</body>
</html>
